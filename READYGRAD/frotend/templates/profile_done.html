<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadyGrad — Profile Organized</title>
    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* Base styles */
        :root {
            --bg-color: #030408;
            --surface-color: rgba(255, 255, 255, 0.02);
            --surface-border: rgba(255, 255, 255, 0.06);
            --text-primary: #ffffff;
            --text-secondary: #9ea4b3;
            --accent-cyan: #00f2fe;
            --accent-purple: #7f00ff;
            --accent-pink: #ff007f;
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-body);
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* Subtle glowing background lights and grid */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 1;
        }

        .glowing-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .glow-orb-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(127, 0, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .glow-orb-2 {
            position: absolute;
            top: 40%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.06) 0%, transparent 70%);
            border-radius: 50%;
        }

        /* Card */
        .done-card {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--surface-border);
            border-radius: 24px;
            padding: 50px;
            max-width: 580px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            z-index: 5;
        }

        .done-icon {
            font-size: 48px;
            margin-bottom: 24px;
            display: inline-block;
            animation: bounce 2s infinite alternate;
        }

        .done-card h1 {
            font-family: var(--font-display);
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .done-card p {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Actions group */
        .done-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-primary-action {
            background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-purple) 100%);
            color: var(--text-primary);
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.2);
            transition: all 0.3s ease;
        }

        .btn-primary-action:hover {
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.4);
            transform: translateY(-1px);
        }

        .btn-secondary-action {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--surface-border);
            color: var(--text-primary);
            padding: 14px 28px;
            border-radius: 12px;
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-secondary-action:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-6px); }
        }
    </style>
</head>
<body>

    <!-- Glowing Background Orbs -->
    <div class="glowing-bg">
        <div class="glow-orb-1"></div>
        <div class="glow-orb-2"></div>
    </div>

    <!-- Done Card -->
    <div class="done-card">
        <div class="done-icon">✨</div>
        <h1>Profile Organized & Ready!</h1>
        <p>Gemma 4 has structured your raw inputs into professional resume bullet blocks and optimized your skills alignment. Your profile completeness is at <strong>{{ profile.completeness }}%</strong>.</p>
        
        <div class="done-actions">
            <a href="/portfolio" class="btn-primary-action">View Portfolio Website</a>
            <a href="/dashboard" class="btn-secondary-action">Go to Dashboard</a>
            <a href="/resume" class="btn-secondary-action">View Tailored CV</a>
        </div>
    </div>

</body>
</html>
