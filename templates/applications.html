<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Applications</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --ink:#1c1f26; --paper:#fafaf9; --accent:#7a2635; --good:#3a7d5c; --rule:#d9d6d1; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Inter',system-ui,sans-serif; color:var(--ink); background:var(--paper); padding:40px 20px; }
  .wrap { max-width: 780px; margin: 0 auto; }
  .top-links { margin-bottom:20px; font-size:0.9rem; }
  .top-links a { color:var(--accent); text-decoration:none; }
  h1 { font-family:'Source Serif 4',serif; font-size:2rem; margin:0 0 24px; }
  .app-card { display:flex; justify-content:space-between; align-items:center; background:#fff; border:1px solid var(--rule); border-radius:8px; padding:18px 22px; margin-bottom:14px; text-decoration:none; color:var(--ink); }
  .app-title { font-weight:600; font-size:1.05rem; }
  .app-meta { font-size:0.85rem; color:#666; margin-top:2px; }
  .app-score { font-family:'Source Serif 4',serif; font-size:1.4rem; font-weight:700; color:var(--good); }
  .status-tag { font-size:0.75rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--good); }
  .empty { color:#777; font-style:italic; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-links"><a href="/jobs">← Back to all jobs</a></div>
  <h1>My Applications</h1>
  {% if applications %}
    {% for a in applications %}
    <a class="app-card" href="/applications/{{ a.job_id }}">
      <div>
        <div class="app-title">{{ a.job_title }}</div>
        <div class="app-meta">{{ a.company }} · Applied {{ a.applied_at }}</div>
        <div class="status-tag">{{ a.status }}</div>
      </div>
      <div class="app-score">{{ a.readiness_score }}%</div>
    </a>
    {% endfor %}
  {% else %}
    <p class="empty">No applications yet — go to /jobs and apply to something.</p>
  {% endif %}
</div>
</body>
</html>
