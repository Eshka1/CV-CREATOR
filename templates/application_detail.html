<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Application — {{ application.job_title }}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --ink:#1c1f26; --paper:#fafaf9; --accent:#7a2635; --good:#3a7d5c; --rule:#d9d6d1; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Inter',system-ui,sans-serif; color:var(--ink); background:var(--paper); padding:40px 20px; }
  .wrap { max-width: 780px; margin: 0 auto; }
  .top-links { margin-bottom:20px; font-size:0.9rem; }
  .top-links a { color:var(--accent); text-decoration:none; }
  h1 { font-family:'Source Serif 4',serif; font-size:1.9rem; margin:0 0 4px; }
  .job-meta { color:#666; font-size:0.9rem; margin-bottom:8px; }
  .status-tag { display:inline-block; background:#e7f3ec; color:var(--good); font-size:0.8rem; padding:4px 12px; border-radius:12px; margin-bottom:24px; }
  .doc-section { background:#fff; border:1px solid var(--rule); border-radius:8px; padding:20px 24px; margin-bottom:20px; }
  .doc-section h2 { font-family:'Source Serif 4',serif; font-size:0.95rem; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink); margin:0 0 12px; }
  .doc-text { white-space:pre-wrap; font-size:0.9rem; color:#333; line-height:1.6; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-links"><a href="/applications">← Back to my applications</a></div>
  <h1>{{ application.job_title }}</h1>
  <div class="job-meta">{{ application.company }} · Applied {{ application.applied_at }} · Readiness {{ application.readiness_score }}%</div>
  <span class="status-tag">{{ application.status }}</span>

  <div class="doc-section">
    <h2>Cover Letter</h2>
    <div class="doc-text">{{ application.cover_letter }}</div>
  </div>

  <div class="doc-section">
    <h2>Application Email</h2>
    <div class="doc-text">{{ application.email }}</div>
  </div>
</div>
</body>
</html>
